; ============================================================================
; mugen.cfg — Main configuration for Fighting Game Engine
; ============================================================================
; All values have engine defaults; this file exists so the engine boots
; past the "data/mugen.cfg not found" error. Values are set to sensible
; defaults for a browser-based fighting game.
;
; See: engine/DolmexicaInfinite/config.cpp loadMugenConfig()

[Options]
; Game difficulty (1-8, default 4)
difficulty = 4
; Starting life percentage (default 100)
life = 100
; Round timer in seconds (default 99, -1 = infinite)
time = 99
; Game speed offset (default 0)
gamespeed = 0
; WAV volume (0-100, default 50)
wavvolume = 50
; MIDI volume (0-100, default 50)
midivolume = 50
; Motif file — the UI definition (default "data/system.def")
motif = data/system.def

[Rules]
; Multipliers for power bar gain from dealing/receiving damage
default.attack.lifetopowermul = 0.7
default.gethit.lifetopowermul = 0.6
super.targetdefencemul = 1.5

[Config]
; Game speed in FPS (default 60)
gamespeed = 60
; Draw character shadows (0/1, default 1)
drawshadows = 1
; Static assignments (0/1, default 0) — debug feature
staticassignments = 0

[Debug]
; Debug mode (0/1, default 0)
debug = 0
allowdebugmode = 1
allowdebugkeys = 0
speedup = 0
; Default stage for debug mode
startstage = stages/stage0.def

[Sound Win]
sound = 1
stereoeffects = 1
panningwidth = 240
masterwavvolume = 255
wavvolume = 128
midivolume = 128
mp3volume = 128
modvolume = 128
playmidi = 1
playmp3 = 1
playmod = 1
playcda = 1

[Misc]
title = "FIGHTING GAME ENGINE"

[Arcade]
ai.randomcolor = 1
ai.cheat = 1
